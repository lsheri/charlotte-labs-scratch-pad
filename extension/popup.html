<!doctype html>
<html><head><meta charset="utf-8"><title>Charlotte</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; width: 340px; padding: 14px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
  label { font-size: 11px; color: #555; display: block; margin-top: 8px; }
  input { width: 100%; padding: 6px 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
  button { margin-top: 10px; width: 100%; padding: 8px; font-size: 13px; font-weight: 600; background: #111; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
  button.secondary { background: #f3f3f3; color: #111; }
  button.warn { background: #b58900; color: #fff; }
  .status { font-size: 11px; margin-top: 8px; min-height: 14px; }
  .ok { color: #0a7c2f; } .err { color: #b00020; } .muted { color: #666; }
  .row { display: flex; gap: 6px; align-items: center; }
  .pill { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 999px; }
  .conn { font-size: 12px; padding: 8px 10px; border-radius: 6px; background: #f6f6f6; margin-bottom: 6px; }
  .conn.connected { background: #e8f5ec; color: #0a5a23; }
  .conn.disconnected { background: #fdecea; color: #8a1c14; }
</style></head>
<body>
  <h1>🧪 Charlotte Recorder</h1>
  <div id="conn" class="conn disconnected">Not connected</div>
  <div class="row"><span class="pill" id="tool">detecting…</span><span class="pill" id="paused-pill" style="display:none;background:#fde7a8;color:#7a5a00">PAUSED</span></div>
  <label>Server URL</label>
  <input id="server" placeholder="https://your-app.lovable.app" />
  <label>Participant token</label>
  <input id="token" placeholder="charlotte_ext_…" />
  <label>Join code (optional)</label>
  <input id="code" placeholder="ABCDEF" />
  <button id="save">Save</button>
  <button id="pause" class="warn">Pause capture</button>
  <button id="capture" class="secondary">Capture this page now</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body></html>
